<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUPY 爪住 - 完整后端数据管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #f5f5f5;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 25px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { display: flex; align-items: center; gap: 15px; font-size: 28px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; border: 2px solid #10b981; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: #10b981; }
        .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; flex-wrap: wrap; }
        .tab-btn { padding: 10px 16px; background: transparent; border: none; color: #94a3b8; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: #10b981; border-bottom-color: #10b981; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 10px 16px; background: #1e293b; border: 2px solid #334155; border-radius: 8px; color: white; }
        .search-input:focus { outline: none; border-color: #10b981; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #10b981; color: white; }
        .btn-primary:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-secondary { background: #64748b; color: white; }
        .table-container { overflow-x: auto; background: #1e293b; border: 2px solid #334155; border-radius: 12px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #0f172a; border-bottom: 2px solid #334155; }
        th { padding: 12px; text-align: left; font-weight: 600; color: #94a3b8; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        tr:hover { background: #0f172a; }
        .action-btns { display: flex; gap: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border: 2px solid #10b981; border-radius: 12px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 15px; }
        .close-btn { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; background: #0f172a; border: 2px solid #334155; border-radius: 8px; color: white; font-family: inherit; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .badge { display: inline-block; padding: 4px 8px; background: #334155; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge.active { background: #10b981; color: #0f172a; }
        .badge.inactive { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐾 PUPY 爪住 - 完整数据管理面板</h1>
            <button class="btn btn-primary" onclick="loadAllData()">🔄 刷新</button>
        </header>

        <div id="message" style="display:none; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('users')">👥 用户</button>
            <button class="tab-btn" onclick="switchTab('pets')">🐾 宠物</button>
            <button class="tab-btn" onclick="switchTab('matches')">💕 配对</button>
            <button class="tab-btn" onclick="switchTab('conversations')">💬 对话</button>
            <button class="tab-btn" onclick="switchTab('messages')">💌 消息</button>
            <button class="tab-btn" onclick="switchTab('products')">🛍️ 商品</button>
            <button class="tab-btn" onclick="switchTab('notifications')">🔔 通知</button>
            <button class="tab-btn" onclick="switchTab('realms')">🌍 领域</button>
            <button class="tab-btn" onclick="switchTab('social-records')">📊 社交</button>
            <button class="tab-btn" onclick="switchTab('orders')">📦 订单</button>
            <button class="tab-btn" onclick="switchTab('adoptions')">🐕‍🦺 收养</button>
            <button class="tab-btn" onclick="switchTab('diary')">📔 日记</button>
            <button class="tab-btn" onclick="switchTab('prayers')">🙏 祈愿</button>
            <button class="tab-btn" onclick="switchTab('comments')">💬评论</button>
            <button class="tab-btn" onclick="switchTab('likes')">👍 点赞</button>
        </div>

        <!-- 用户 -->
        <div id="users" class="tab-content active">
            <div class="search-bar">
                <input type="text" class="search-input" id="usersSearch" placeholder="搜索用户...">
                <button class="btn btn-primary" onclick="showModal('users', null)">➕ 新增</button>
            </div>
            <div id="usersTable" class="table-container"></div>
        </div>

        <!-- 宠物 -->
        <div id="pets" class="tab-content">
            <div class="search-bar">
                <input type="text" class="search-input" id="petsSearch" placeholder="搜索宠物...">
                <button class="btn btn-primary" onclick="showModal('pets', null)">➕ 新增</button>
            </div>
            <div id="petsTable" class="table-container"></div>
        </div>

        <!-- 配对 -->
        <div id="matches" class="tab-content">
            <div id="matchesTable" class="table-container"></div>
        </div>

        <!-- 对话 -->
        <div id="conversations" class="tab-content">
            <div id="conversationsTable" class="table-container"></div>
        </div>

        <!-- 消息 -->
        <div id="messages" class="tab-content">
            <div id="messagesTable" class="table-container"></div>
        </div>

        <!-- 商品 -->
        <div id="products" class="tab-content">
            <div class="search-bar">
                <input type="text" class="search-input" id="productsSearch" placeholder="搜索商品...">
                <button class="btn btn-primary" onclick="showModal('products', null)">➕ 新增</button>
            </div>
            <div id="productsTable" class="table-container"></div>
        </div>

        <!-- 通知 -->
        <div id="notifications" class="tab-content">
            <div id="notificationsTable" class="table-container"></div>
        </div>

        <!-- 虚拟领域 -->
        <div id="realms" class="tab-content">
            <div class="search-bar">
                <button class="btn btn-primary" onclick="showModal('realms', null)">➕ 新增</button>
            </div>
            <div id="realmsTable" class="table-container"></div>
        </div>

        <!-- 社交记录 -->
        <div id="social-records" class="tab-content">
            <div id="socialTable" class="table-container"></div>
        </div>

        <!-- 订单 -->
        <div id="orders" class="tab-content">
            <div class="search-bar">
                <button class="btn btn-primary" onclick="showModal('orders', null)">➕ 新增</button>
            </div>
            <div id="ordersTable" class="table-container"></div>
        </div>

        <!-- 收养 -->
        <div id="adoptions" class="tab-content">
            <div class="search-bar">
                <button class="btn btn-primary" onclick="showModal('adoptions', null)">➕ 新增</button>
            </div>
            <div id="adoptionsTable" class="table-container"></div>
        </div>

        <!-- 日记 -->
        <div id="diary" class="tab-content">
            <div id="diaryTable" class="table-container"></div>
        </div>

        <!-- 祈愿 -->
        <div id="prayers" class="tab-content">
            <div id="prayersTable" class="table-container"></div>
        </div>

        <!-- 评论 -->
        <div id="comments" class="tab-content">
            <div id="commentsTable" class="table-container"></div>
        </div>

        <!-- 点赞 -->
        <div id="likes" class="tab-content">
            <div id="likesTable" class="table-container"></div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api/admin';
        let data = {};
        let currentTab = 'users';

        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            // 绑定搜索事件
            ['usersSearch', 'petsSearch', 'productsSearch'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', (e) => {
                    const type = id.replace('Search', '');
                    const tab = type === 'users' || type === 'pets' || type === 'products' ? type : null;
                    if (tab) renderTable(tab, e.target.value);
                });
            });
        });

        async function loadAllData() {
            try {
                const modules = ['users', 'pets', 'matches', 'conversations', 'messages', 'products', 'notifications', 'realms', 'pet-social-records', 'orders', 'adoptions', 'diary-entries', 'ai-prayers', 'comments', 'likes'];
                for (const mod of modules) {
                    data[mod] = await fetch(`${API_BASE}/${mod}`).then(r => r.json()).then(r => r.data || []).catch(() => []);
                }
                updateStats();
                renderTable(currentTab);
                showMsg('加载成功', 'success');
            } catch (error) {
                showMsg('加载失败: ' + error.message, 'error');
            }
        }

        function updateStats() {
            const stats = {
                '用户': (data['users'] || []).length,
                '宠物': (data['pets'] || []).length,
                '配对': (data['matches'] || []).length,
                '对话': (data['conversations'] || []).length,
                '消息': (data['messages'] || []).length,
                '商品': (data['products'] || []).length,
                '通知': (data['notifications'] || []).length,
                '领域': (data['realms'] || []).length,
                '收养': (data['adoptions'] || []).length,
                '订单': (data['orders'] || []).length,
                '日记': (data['diary-entries'] || []).length,
                '祈愿': (data['ai-prayers'] || []).length
            };
            const html = Object.entries(stats).map(([k, v]) => `<div class="stat-card"><div class="stat-value">${v}</div><div class="stat-label">${k}</div></div>`).join('');
            document.getElementById('statsGrid').innerHTML = html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
            currentTab = tab;
            renderTable(tab);
        }

        function renderTable(type, search = '') {
            const containers = {
                'users': { data: data['users'] || [], id: 'usersTable' },
                'pets': { data: data['pets'] || [], id: 'petsTable' },
                'matches': { data: data['matches'] || [], id: 'matchesTable' },
                'conversations': { data: data['conversations'] || [], id: 'conversationsTable' },
                'messages': { data: data['messages'] || [], id: 'messagesTable' },
                'products': { data: data['products'] || [], id: 'productsTable' },
                'notifications': { data: data['notifications'] || [], id: 'notificationsTable' },
                'realms': { data: data['realms'] || [], id: 'realmsTable' },
                'social-records': { data: data['pet-social-records'] || [], id: 'socialTable' },
                'orders': { data: data['orders'] || [], id: 'ordersTable' },
                'adoptions': { data: data['adoptions'] || [], id: 'adoptionsTable' },
                'diary': { data: data['diary-entries'] || [], id: 'diaryTable' },
                'prayers': { data: data['ai-prayers'] || [], id: 'prayersTable' },
                'comments': { data: data['comments'] || [], id: 'commentsTable' },
                'likes': { data: data['likes'] || [], id: 'likesTable' }
            };

            const container = containers[type];
            if (!container) return;

            let items = container.data;
            if (search && type === 'users') items = items.filter(u => u.email?.includes(search) || u.username?.includes(search));
            if (search && type === 'pets') items = items.filter(p => p.name?.includes(search) || p.breed?.includes(search));
            if (search && type === 'products') items = items.filter(p => p.title?.includes(search));

            if (items.length === 0) {
                document.getElementById(container.id).innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
                return;
            }

            let html = '<table><thead><tr>';
            
            // 根据类型生成表头和行
            if (type === 'users') {
                html += '<th>用户名</th><th>邮箱</th><th>等级</th><th>操作</th></tr></thead><tbody>';
                html += items.map(u => `<tr><td>${u.username}</td><td>${u.email}</td><td>${u.user_level}</td><td><button class="btn btn-secondary" onclick="showModal('users','${u.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('users','${u.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'pets') {
                html += '<th>名称</th><th>品种</th><th>是否真实</th><th>操作</th></tr></thead><tbody>';
                html += items.map(p => `<tr><td>${p.name}</td><td>${p.breed}</td><td><span class="badge ${p.is_real ? 'active' : 'inactive'}">${p.is_real ? '真实' : 'AI'}</span></td><td><button class="btn btn-secondary" onclick="showModal('pets','${p.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('pets','${p.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'matches') {
                html += '<th>方向</th><th>兼容度</th><th>相互关注</th><th>操作</th></tr></thead><tbody>';
                html += items.map(m => `<tr><td>${m.direction}</td><td>${m.compatibility_score}%</td><td><span class="badge ${m.is_mutual ? 'active' : 'inactive'}">${m.is_mutual ? 'Y' : 'N'}</span></td><td><button class="btn btn-danger" onclick="deleteItem('matches','${m.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'conversations') {
                html += '<th>类型</th><th>最后消息</th><th>操作</th></tr></thead><tbody>';
                html += items.map(c => `<tr><td>${c.conversation_type}</td><td>${(c.last_message || '').substring(0,30)}...</td><td><button class="btn btn-danger" onclick="deleteItem('conversations','${c.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'messages') {
                html += '<th>内容</th><th>已读</th><th>操作</th></tr></thead><tbody>';
                html += items.map(m => `<tr><td>${(m.message_text || '').substring(0,40)}...</td><td><span class="badge ${m.is_read ? 'active' : 'inactive'}">已读</span></td><td><button class="btn btn-danger" onclick="deleteItem('messages','${m.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'products') {
                html += '<th>名称</th><th>价格</th><th>库存</th><th>操作</th></tr></thead><tbody>';
                html += items.map(p => `<tr><td>${p.title}</td><td>¥${p.price}</td><td>${p.inventory}</td><td><button class="btn btn-secondary" onclick="showModal('products','${p.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('products','${p.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'notifications') {
                html += '<th>标题</th><th>内容</th><th>操作</th></tr></thead><tbody>';
                html += items.map(n => `<tr><td>${n.title || 'N/A'}</td><td>${(n.message || '').substring(0,40)}...</td><td><button class="btn btn-danger" onclick="deleteItem('notifications','${n.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'realms') {
                html += '<th>名称</th><th>类型</th><th>操作</th></tr></thead><tbody>';
                html += items.map(r => `<tr><td>${r.name}</td><td>${r.realm_type}</td><td><button class="btn btn-secondary" onclick="showModal('realms','${r.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('realms','${r.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'social-records') {
                html += '<th>行为类型</th><th>宠物ID</th><th>操作</th></tr></thead><tbody>';
                html += items.map(s => `<tr><td>${s.action_type || 'N/A'}</td><td>${(s.pet_id || '').substring(0,8)}...</td><td><button class="btn btn-danger" onclick="deleteItem('pet-social-records','${s.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'orders') {
                html += '<th>订单ID</th><th>状态</th><th>金额</th><th>操作</th></tr></thead><tbody>';
                html += items.map(o => `<tr><td>${(o.id || '').substring(0,8)}...</td><td>${o.order_status}</td><td>¥${o.total_price}</td><td><button class="btn btn-secondary" onclick="showModal('orders','${o.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('orders','${o.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'adoptions') {
                html += '<th>宠物ID</th><th>状态</th><th>操作</th></tr></thead><tbody>';
                html += items.map(a => `<tr><td>${(a.pet_id || '').substring(0,8)}...</td><td>${a.adoption_status}</td><td><button class="btn btn-secondary" onclick="showModal('adoptions','${a.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('adoptions','${a.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'diary') {
                html += '<th>标题</th><th>心情</th><th>公开</th><th>操作</th></tr></thead><tbody>';
                html += items.map(d => `<tr><td>${d.title || 'N/A'}</td><td>${d.mood || 'N/A'}</td><td><span class="badge ${d.is_public ? 'active' : 'inactive'}">${d.is_public ? '公' : '私'}</span></td><td><button class="btn btn-secondary" onclick="showModal('diary','${d.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('diary-entries','${d.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'prayers') {
                html += '<th>祈愿类型</th><th>是否实现</th><th>操作</th></tr></thead><tbody>';
                html += items.map(p => `<tr><td>${p.prayer_type || 'N/A'}</td><td><span class="badge ${p.is_fulfilled ? 'active' : 'inactive'}">${p.is_fulfilled ? '已' : '未'}</span></td><td><button class="btn btn-secondary" onclick="showModal('prayers','${p.id}')">编辑</button><button class="btn btn-danger" onclick="deleteItem('ai-prayers','${p.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'comments') {
                html += '<th>内容</th><th>目标类型</th><th>操作</th></tr></thead><tbody>';
                html += items.map(c => `<tr><td>${(c.content || '').substring(0,40)}...</td><td>${c.target_type}</td><td><button class="btn btn-danger" onclick="deleteItem('comments','${c.id}')">删除</button></td></tr>`).join('');
            } else if (type === 'likes') {
                html += '<th>目标类型</th><th>目标ID</th><th>操作</th></tr></thead><tbody>';
                html += items.map(l => `<tr><td>${l.target_type}</td><td>${(l.target_id || '').substring(0,8)}...</td><td><button class="btn btn-danger" onclick="deleteItem('likes','${l.id}')">删除</button></td></tr>`).join('');
            }

            html += '</tbody></table>';
            document.getElementById(container.id).innerHTML = html;
        }

        function showModal(type, id) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            let item = id ? (data[type === 'diary' ? 'diary-entries' : type === 'prayers' ? 'ai-prayers' : type === 'social-records' ? 'pet-social-records' : type] || []).find(i => i.id === id) : null;

            title.textContent = id ? `编辑${type}` : `新增${type}`;

            const forms = {
                users: `<form onsubmit="saveItem(event, 'users', '${id || ''}')"><div class="form-group"><label>邮箱</label><input name="email" value="${item?.email || ''}" required></div><div class="form-group"><label>用户名</label><input name="username" value="${item?.username || ''}" required></div><div class="form-group"><label>昵称</label><input name="name" value="${item?.bio || ''}" required></div><div class="form-group"><label>等级</label><input type="number" name="user_level" value="${item?.user_level || 1}" min="1"></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                pets: `<form onsubmit="saveItem(event, 'pets', '${id || ''}')"><div class="form-group"><label>宠物名</label><input name="name" value="${item?.name || ''}" required></div><div class="form-group"><label>品种</label><input name="breed" value="${item?.breed || ''}"></div><div class="form-group"><label>性别</label><select name="gender"><option value="male" ${item?.gender === 'male' ? 'selected' : ''}>公</option><option value="female" ${item?.gender === 'female' ? 'selected' : ''}>母</option></select></div><div class="form-group"><label>是否真实</label><select name="is_real"><option value="true" ${item?.is_real ? 'selected' : ''}>真实</option><option value="false" ${!item?.is_real ? 'selected' : ''}>AI</option></select></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                products: `<form onsubmit="saveItem(event, 'products', '${id || ''}')"><div class="form-group"><label>商品名</label><input name="title" value="${item?.title || ''}" required></div><div class="form-group"><label>描述</label><textarea name="description">${item?.description || ''}</textarea></div><div class="form-group"><label>价格</label><input type="number" name="price" value="${item?.price || ''}" step="0.01" required></div><div class="form-group"><label>库存</label><input type="number" name="inventory" value="${item?.inventory || 0}"></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                realms: `<form onsubmit="saveItem(event, 'realms', '${id || ''}')"><div class="form-group"><label>名称</label><input name="name" value="${item?.name || ''}" required></div><div class="form-group"><label>描述</label><textarea name="description">${item?.description || ''}</textarea></div><div class="form-group"><label>类型</label><select name="realm_type"><option value="fantasy" ${item?.realm_type === 'fantasy' ? 'selected' : ''}>幻想</option><option value="space" ${item?.realm_type === 'space' ? 'selected' : ''}>太空</option><option value="castle" ${item?.realm_type === 'castle' ? 'selected' : ''}>城堡</option></select></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                orders: `<form onsubmit="saveItem(event, 'orders', '${id || ''}')"><div class="form-group"><label>订单状态</label><select name="order_status"><option value="pending" ${item?.order_status === 'pending' ? 'selected' : ''}>待处理</option><option value="paid" ${item?.order_status === 'paid' ? 'selected' : ''}>已支付</option><option value="shipped" ${item?.order_status === 'shipped' ? 'selected' : ''}>已发货</option><option value="delivered" ${item?.order_status === 'delivered' ? 'selected' : ''}>已交付</option></select></div><div class="form-group"><label>总价</label><input type="number" name="total_price" value="${item?.total_price || ''}" step="0.01"></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                adoptions: `<form onsubmit="saveItem(event, 'adoptions', '${id || ''}')"><div class="form-group"><label>收养状态</label><select name="adoption_status"><option value="pending" ${item?.adoption_status === 'pending' ? 'selected' : ''}>待审批</option><option value="approved" ${item?.adoption_status === 'approved' ? 'selected' : ''}>已批准</option><option value="completed" ${item?.adoption_status === 'completed' ? 'selected' : ''}>已完成</option></select></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                diary: `<form onsubmit="saveItem(event, 'diary-entries', '${id || ''}')"><div class="form-group"><label>是否公开</label><select name="is_public"><option value="true" ${item?.is_public ? 'selected' : ''}>公开</option><option value="false" ${!item?.is_public ? 'selected' : ''}>私密</option></select></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`,
                prayers: `<form onsubmit="saveItem(event, 'ai-prayers', '${id || ''}')"><div class="form-group"><label>是否实现</label><select name="is_fulfilled"><option value="true" ${item?.is_fulfilled ? 'selected' : ''}>已实现</option><option value="false" ${!item?.is_fulfilled ? 'selected' : ''}>未实现</option></select></div><div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button><button type="submit" class="btn btn-primary">保存</button></div></form>`
            };

            document.getElementById('modalBody').innerHTML = forms[type] || '<p>暂无编辑选项</p>';
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function saveItem(e, type, id) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData);
            
            const path = type === 'diary' ? 'diary-entries' : type === 'prayers' ? 'ai-prayers' : type;
            const url = id ? `${API_BASE}/${path}/${id}` : `${API_BASE}/${path}`;
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error('保存失败');
                showMsg('保存成功', 'success');
                closeModal();
                loadAllData();
            } catch (err) {
                showMsg('保存失败: ' + err.message, 'error');
            }
        }

        async function deleteItem(type, id) {
            if (!confirm('确定要删除吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/${type}/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('删除失败');
                showMsg('删除成功', 'success');
                loadAllData();
            } catch (err) {
                showMsg('删除失败: ' + err.message, 'error');
            }
        }

        function showMsg(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = type;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
